<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <form th:action="@{/students/update/{id}(id=${student.id})}" th:object="${student}" method="post">
        <div class="form-group" hidden="hidden">
            <label>ID:</label>
            <input type="text" th:field="*{id}" />
        </div>

        <div class="form-group">
            <label>code :</label>
            <input type="text" th:field="*{studentCode}" />
        </div>

        <div class="form-group">
            <label>Họ và tên:</label>
            <input type="text" th:field="*{fullName}" />
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}"  />
        </div>

        <div class="form-group">
            <label>Chuyên ngành:</label>
            <input type="text" th:field="*{major}"  />
        </div>

        <div class="form-group">
            <label>GPA:</label>
            <input type="text" th:field="*{gpa}"  />
        </div>
        <button type="submit">update</button>
    </form>
        <a th:href="@{/students}">Quay lại danh sách</a>
</body>
</html>
